name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Migrate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_crm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ai_crm?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Boot smoke test
        run: |
          node dist/main.js &
          APP_PID=$!
          for i in {1..15}; do
            if curl -fsS http://localhost:3000/health > /dev/null; then break; fi
            sleep 1
          done
          curl -fsS http://localhost:3000/health
          echo ""
          curl -fsS http://localhost:3000/events
          echo ""
          curl -fsS http://localhost:3000/agents | grep -q '"count":10' && echo "✓ 10 agents registered"
          kill $APP_PID
        env:
          PORT: 3000
